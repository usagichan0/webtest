{{define "title"}}ポップアップテスト{{end}}
{{define "content"}}
    <h1>コンテンツ・JavaScriptテスト (window.open)</h1>

    <div class="section">
        <h2>window.open の各種状態テスト</h2>
        
        <div class="form-group">
            <button id="btn-popup-default">デフォルト (新しいタブまたはウィンドウ)</button>
        </div>
        
        <div class="form-group">
            <button id="btn-popup-blank">_blank 指定のみ</button>
        </div>
        
        <div class="form-group">
            <button id="btn-popup-size">サイズ指定あり (幅500, 高さ400)</button>
        </div>
        
        <div class="form-group">
            <button id="btn-popup-features">機能制限あり (popup=yes, scrollbars=no, resizable=no)</button>
        </div>
        
        <div class="form-group">
            <button id="btn-popup-position">位置指定あり (left=100, top=100, width=600, height=400)</button>
        </div>

        <div class="form-group">
            <button id="btn-popup-about">about:blank を開いて内容書き込み</button>
        </div>
    </div>

    <script>
        const targetUrl = "/popups/target";

        document.getElementById('btn-popup-default').addEventListener('click', () => {
            window.open(targetUrl, 'PopupDefault');
        });

        document.getElementById('btn-popup-blank').addEventListener('click', () => {
            window.open(targetUrl, '_blank');
        });

        document.getElementById('btn-popup-size').addEventListener('click', () => {
            window.open(targetUrl, 'PopupSize', 'width=500,height=400');
        });

        document.getElementById('btn-popup-features').addEventListener('click', () => {
            window.open(targetUrl, 'PopupFeatures', 'popup=yes,scrollbars=no,resizable=no,width=400,height=300');
        });

        document.getElementById('btn-popup-position').addEventListener('click', () => {
            window.open(targetUrl, 'PopupPosition', 'left=100,top=100,width=600,height=400');
        });

        document.getElementById('btn-popup-about').addEventListener('click', () => {
            const w = window.open('about:blank', 'PopupAbout', 'width=400,height=300');
            w.document.write('<!DOCTYPE html><html><head><title>about:blank</title><style>body{font-family:sans-serif;text-align:center;padding:50px;}</style></head><body><h2>about:blank</h2><p>動的に生成されたコンテンツです。</p><button onclick="window.close()" style="padding:10px;">閉じる</button></body></html>');
            w.document.close();
        });
    </script>
{{end}}
